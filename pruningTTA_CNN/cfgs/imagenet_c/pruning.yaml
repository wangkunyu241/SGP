CORRUPTION:
  DATASET: imagenet_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
MODEL:
  ADAPTATION: pruning
  ARCH: resnet50
OPTIM:
  METHOD: Adam
  STEPS: 1
  BETA: 0.9
  LR: 1e-3
  WD: 0.
TEST:
  BATCH_SIZE: 64
PRUNING:
  THRESHOLD: 1e-2
  RATE: 0.2
  LAMDA_ALIGN: 2.9
  LAMDA_MU_STD: 3.5
  LAMDA_MARGIN: 2.6
  LAMDA_SPARSE: 2e-3
