MODEL:
  ADAPTATION: pruning
  ARCH: Standard
TEST:
  BATCH_SIZE: 200
CORRUPTION:
  DATASET: cifar10_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
OPTIM:
  METHOD: Adam
  STEPS: 1
  BETA: 0.9
  LR: 2e-3
  WD: 0.
PRUNING:
  THRESHOLD: 0.10
  RATE: 0.20
  LAMDA_ALIGN: 0.1
  LAMDA_MU_STD: 0.9
  LAMDA_MARGIN: 0.3
  LAMDA_SPARSE: 1e-4
