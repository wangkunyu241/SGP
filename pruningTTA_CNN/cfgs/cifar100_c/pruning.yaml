MODEL:
  ADAPTATION: pruning
  ARCH: Hendrycks2020AugMix_ResNeXt 
TEST:
  BATCH_SIZE: 200
CORRUPTION:
  DATASET: cifar100_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
OPTIM:
  METHOD: Adam
  STEPS: 1
  BETA: 0.9
  LR: 2e-3
  WD: 0.
PRUNING:
  THRESHOLD: 1e-7
  RATE: 0.2
  LAMDA_ALIGN: 2.0
  LAMDA_MU_STD: 1.1
  LAMDA_MARGIN: 1.2
  LAMDA_SPARSE: 8e-3
  
